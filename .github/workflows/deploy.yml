# Production deploy to Vercel from GitHub Actions (no Vercel Git auto-deploy required).
#
# Triggers:
#   - workflow_dispatch: run from Actions → Deploy to Vercel (you choose when).
#   - workflow_call: optional; uncomment the deploy job in ci.yml and use secrets: inherit.
#
# Secrets (repository or the GitHub Environment below):
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   https://vercel.com/guides/how-can-i-use-github-actions-with-vercel
#
# If Vercel is also connected to this repo, turn off automatic Production Deployments
# for the branch you manage via Actions (Project → Settings → Git).
name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      github-environment:
        description: "GitHub Environment name (scoped secrets + optional approval rules)"
        type: string
        required: false
        default: production
  workflow_call:
    inputs:
      github-environment:
        description: "GitHub Environment name (scoped secrets + optional approval rules)"
        type: string
        required: false
        default: production

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.github-environment }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
