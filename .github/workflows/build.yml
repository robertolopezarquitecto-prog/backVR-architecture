# Reusable: run production build.
name: Build

on:
  workflow_call:
    inputs:
      github-environment:
        description: "GitHub Environment name (environment secrets are only available when set here)"
        type: string
        required: false
        default: production

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: ${{ inputs.github-environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
